# SDKWork Canvas quality gates
# Authority: ../sdkwork-specs/QUALITY_GATE_SPEC.md

application:
  code: canvas
  version: 0.1.0

definitionOfDone:
  - code: Follows sdkwork-specs; no settings/notes legacy naming in configs
  - tests: cargo test --workspace and pnpm test pass
  - api: SdkWorkApiResponse / ProblemDetail on all HTTP operations
  - database: contract aligns with canvas_* baseline tables
  - security: IAM dual-token; tenant scope in SQL
  - drive: All uploads via sdkwork-drive only
  - docs: PRD + TECH_ARCHITECTURE current; no historical shards

mergeGates:
  - command: cargo check --workspace
    required: true
  - command: cargo test --workspace
    required: true
  - command: pnpm test
    required: true

releaseGates:
  - command: pnpm check:pnpm-script-standard
    required: true
  - command: node ../sdkwork-specs/tools/check-api-response-envelope.mjs --workspace .
    required: true
  - command: pnpm db:validate
    required: true

commercialReadiness:
  - performance: List/search APIs use store-level pagination
  - security: Tenant isolation; Drive-backed file bytes
  - observability: traceId on all API responses
  - deploy: standalone + cloud profiles in deployments/deploy.yaml
