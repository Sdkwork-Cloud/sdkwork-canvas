mode = "split"

[service]
name = "sdkwork-api-cloud-gateway"
environment = "production"

[server]
bind = "0.0.0.0:3900"

[[dependencySurfaces]]
serviceId = "sdkwork-iam-app-api"
workspace = "sdkwork-appbase"
sdkFamily = "sdkwork-iam-app-sdk"
apiAuthority = "sdkwork-iam-app-api"
surface = "app"
apiPrefix = "/app/v3/api"
runtimeMode = "split-or-embedded"
sameOriginAllowed = true
executableExport = "sdkwork_routes_iam_app_api::build_sdkwork_iam_app_api_router"
cargoFeature = "foundation-appbase"
cargoDependency = "sdkwork_routes_iam_app_api"
coverage = "appbase-iam-routes"
requiredBaseUrlKey = "SDKWORK_APPBASE_APP_API_BASE_URL"

[[dependencySurfaces]]
serviceId = "sdkwork-canvas-app-api"
workspace = "sdkwork-canvas"
sdkFamily = "sdkwork-canvas-app-sdk"
apiAuthority = "sdkwork-canvas-app-api"
surface = "app"
apiPrefix = "/app/v3/api/canvas"
runtimeMode = "split"
sameOriginAllowed = true
requiredBaseUrlKey = "SDKWORK_CANVAS_APPLICATION_PUBLIC_HTTP_URL"
coverage = "canvas-app-api-upstream-routes"

[[dependencySurfaces]]
serviceId = "sdkwork-canvas-backend-api"
workspace = "sdkwork-canvas"
sdkFamily = "sdkwork-canvas-backend-sdk"
apiAuthority = "sdkwork-canvas-backend-api"
surface = "backend"
apiPrefix = "/backend/v3/api/canvas"
runtimeMode = "split"
sameOriginAllowed = true
requiredBaseUrlKey = "SDKWORK_CANVAS_APPLICATION_PUBLIC_HTTP_URL"
coverage = "canvas-backend-api-upstream-routes"

[[upstreams]]
serviceId = "sdkwork-canvas-app-api"
baseUrl = "http://sdkwork-api-canvas-standalone-gateway:8787"

[[upstreams]]
serviceId = "sdkwork-canvas-backend-api"
baseUrl = "http://sdkwork-api-canvas-standalone-gateway:8787"

[cors]
allowAnyOrigin = false
allowedOrigins = [
  "https://api.sdkwork.com",
  "https://canvas.sdkwork.com",
]

[request]
maxBodyBytes = 33554432
timeoutMs = 120000

[readiness]
enabled = true
checkUpstreams = true
timeoutMs = 3000

[observability]
accessLogEnabled = true
auditLogEnabled = true
accessLogSampleRateBasisPoints = 10000
auditLogSampleRateBasisPoints = 10000
metricsEnabled = true
metricsPath = "/metrics"
tracingEnabled = false
redactHeaders = ["authorization", "access-token", "cookie", "x-api-key", "set-cookie"]

[security]
allowedHosts = ["api.sdkwork.com", "canvas.sdkwork.com"]
trustedProxyCidrs = []
secureHeadersEnabled = true
maxHeaderBytes = 65536
maxHeaderCount = 128
rejectCredentialHeadersOnAnonymousAuthRoutes = true
csrfGuardEnabled = true

[traffic]
rateLimitEnabled = true
compatXRateLimitHeaders = true
globalMaxInFlight = 2048
